apiVersion: v1
kind: Service
metadata:
  name: {{ include "vandalizer.fullname" . }}-mongo
  labels:
    {{- include "vandalizer.labels" . | nindent 4 }}
    app.kubernetes.io/component: mongo
spec:
  clusterIP: None
  ports:
    - name: mongo
      port: {{ .Values.mongo.service.port }}
      targetPort: mongo
  selector:
    {{- include "vandalizer.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: mongo

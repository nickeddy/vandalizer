{{- if .Values.ingress.enabled }}
{{- $host := required "ingress.host is required when ingress.enabled is true — set it in your environment values file" .Values.ingress.host -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "vandalizer.fullname" . }}
  labels:
    {{- include "vandalizer.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.ingress.bodyLimit.enabled }}
    traefik.ingress.kubernetes.io/router.middlewares: {{ printf "%s-%s-buffering@kubernetescrd" .Release.Namespace (include "vandalizer.fullname" .) }}
    {{- end }}
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ $host }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ $host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "vandalizer.fullname" . }}-frontend
                port:
                  number: {{ .Values.frontend.service.port }}
{{- end }}

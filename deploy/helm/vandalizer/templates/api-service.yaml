apiVersion: v1
kind: Service
metadata:
  name: {{ include "vandalizer.fullname" . }}-api
  labels:
    {{- include "vandalizer.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: http
  selector:
    {{- include "vandalizer.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api

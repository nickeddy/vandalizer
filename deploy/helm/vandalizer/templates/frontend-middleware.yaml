{{- if and .Values.ingress.enabled .Values.ingress.bodyLimit.enabled }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "vandalizer.fullname" . }}-buffering
  labels:
    {{- include "vandalizer.labels" . | nindent 4 }}
spec:
  buffering:
    maxRequestBodyBytes: {{ .Values.ingress.bodyLimit.maxRequestBodyBytes | int64 }}
{{- end }}
